<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CE Spacegame — Live Galaxy Map</title>
<meta name="theme-color" content="#03060e" />
<style>
  :root { --bg:#03060e; --ink:#dfe9f7; --dim:#7f93ad; --line:rgba(120,170,255,.15); --accent:#7af0ff; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace; overflow:hidden; }
  #cv { display:block; position:fixed; inset:0; cursor:grab; }
  #cv.grabbing { cursor:grabbing; }
  .panel { position:fixed; background:rgba(6,11,20,.72); border:1px solid var(--line);
    border-radius:10px; backdrop-filter:blur(6px); padding:10px 12px; font-size:12px; }
  #hud { top:12px; left:12px; min-width:214px; }
  #hud h1 { margin:0 0 6px; font-size:13px; letter-spacing:2px; color:var(--accent); font-weight:600; }
  #hud .row { display:flex; justify-content:space-between; gap:14px; color:var(--dim); line-height:1.7; }
  #hud .row b { color:var(--ink); font-weight:600; }
  #hud .src-live { color:#8fe0a8; } #hud .src-off { color:#ff9a6b; }
  #feed { top:12px; right:12px; width:270px; max-height:40vh; overflow:hidden; }
  #feed h2 { margin:0 0 6px; font-size:10px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; }
  #feed .ev { font-size:11px; line-height:1.6; }
  #feed .ev .t { color:var(--dim); } #feed .kill { color:#ff8d7a; }
  #legend { bottom:12px; left:12px; color:var(--dim); font-size:11px; line-height:1.8; }
  #legend .sw { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:-1px; }
  #ctl { bottom:12px; right:12px; display:flex; gap:8px; align-items:center; color:var(--dim); }
  #ctl button { font:inherit; font-size:11px; color:var(--ink); background:rgba(20,32,52,.9);
    border:1px solid var(--line); border-radius:7px; padding:6px 10px; cursor:pointer; }
  #ctl button:hover { border-color:var(--accent); }
  a.back { color:var(--accent); text-decoration:none; font-size:11px; }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="hud" class="panel">
  <h1>LIVE GALAXY MAP</h1>
  <div class="row"><span>source</span><b id="s-src" class="src-off">connecting…</b></div>
  <div class="row"><span>players</span><b id="s-players">0</b></div>
  <div class="row"><span>ships</span><b id="s-ships">0</b></div>
  <div class="row"><span>sectors live</span><b id="s-sectors">0</b></div>
  <div class="row"><span>tick</span><b id="s-tick">—</b></div>
  <div class="row" style="margin-top:4px"><a class="back" href="../">◂ back to the game</a></div>
</div>

<div id="feed" class="panel"><h2>kill feed</h2><div id="events"></div></div>

<div id="legend" class="panel">
  <div><span class="sw" style="background:#7af0ff"></span>player &nbsp;
       <span class="sw" style="background:#ff5f4d"></span>marauder &nbsp;
       <span class="sw" style="background:#8fe0a8"></span>fleet</div>
  <div style="color:#6c7f9c">haze = real asteroid belts (the same deterministic noise the sim mines)</div>
  <div style="color:#6c7f9c">drag pan · wheel zoom</div>
</div>

<div id="ctl" class="panel">
  <button id="fit">fit to action</button>
</div>

<!-- ce-serve injects /__ce/mesh-bridge.js, exposing window.__ceNode — the same-origin mesh transport. -->
<script>
"use strict";
//==================================================================================================
// Deterministic worldgen mirror — MUST match spacegame/src/noise.rs + sim.rs rock constants exactly
// (fBm value noise over rock cells). The belts drawn here are the belts the sim actually mines.
//==================================================================================================
const SECTOR_SIZE = 9000, ROCK_CELL = 300;
const ROCK_NOISE_SCALE = 0.055, ROCK_BELT_THRESHOLD = 0.56, ROCK_NOISE_SEED = 7;

function hash01(x, y, seed) { // mirrors noise.rs::hash01 (u32 wrap-around math)
  let h = (0x811c9dc5 ^ Math.imul(seed, 0x9e3779b9)) >>> 0;
  h = Math.imul(h ^ (x >>> 0), 0x01000193) >>> 0;
  h = Math.imul(h ^ (y >>> 0), 0x01000193) >>> 0;
  h = (h ^ (h >>> 15)) >>> 0; h = Math.imul(h, 0x2c1b3c6d) >>> 0; h = (h ^ (h >>> 12)) >>> 0;
  return (h & 0x00ffffff) / 0x01000000;
}
const smooth = t => t * t * t * (t * (t * 6 - 15) + 10);
function vnoise2(x, y, seed) {
  const xf = Math.floor(x), yf = Math.floor(y);
  const tx = smooth(x - xf), ty = smooth(y - yf);
  const a = hash01(xf, yf, seed), b = hash01(xf + 1, yf, seed);
  const c = hash01(xf, yf + 1, seed), d = hash01(xf + 1, yf + 1, seed);
  const top = a + (b - a) * tx, bot = c + (d - c) * tx;
  return top + (bot - top) * ty;
}
function fbm2(x, y, oct, seed) {
  let sum = 0, amp = 1, norm = 0;
  for (let o = 0; o < oct; o++) { sum += vnoise2(x, y, (seed + o * 101) >>> 0) * amp; norm += amp; amp *= 0.5; x *= 2; y *= 2; }
  return sum / norm;
}
// Belt density at a WORLD position (world units → rock-cell units → fbm), 0 in the void.
function beltAt(wx, wy) {
  const d = fbm2(wx / ROCK_CELL * ROCK_NOISE_SCALE, wy / ROCK_CELL * ROCK_NOISE_SCALE, 4, ROCK_NOISE_SEED);
  return d < ROCK_BELT_THRESHOLD ? 0 : (d - ROCK_BELT_THRESHOLD) / (1 - ROCK_BELT_THRESHOLD);
}

//==================================================================================================
// Live data — fold the authoritative /state snapshots of the genesis plus-ring (the seed publishes
// them; every ship near origin is in here, players and NPCs alike). No demo data, no fakes.
//==================================================================================================
const SECTORS = ["0_0", "1_0", "n1_0", "0_1", "0_n1"];
function sectorOrigin(tok) {
  const [a, b] = tok.split("_");
  const n = s => s.startsWith("n") ? -Number(s.slice(1)) : Number(s);
  return [n(a) * SECTOR_SIZE, n(b) * SECTOR_SIZE];
}
const model = { snaps: new Map(), events: [], lastMsg: 0 };   // sector token -> {snap, at}
function pushKill(k) {
  model.events.unshift({ t: Date.now(), text: `${k.killer || "?"} ✕ ${k.victim || "?"}` });
  model.events.length = Math.min(model.events.length, 30);
}
const seenKills = new Set();

async function liveSource() {
  const node = globalThis.__ceNode;
  if (!node || typeof node.stream !== "function") return false;
  for (const s of SECTORS) {
    try { await node.request("POST", "/mesh/subscribe", { body: { topic: `ce-game/spacegame/${s}/state` } }); } catch (_) {}
  }
  (async () => { for (;;) {
    try {
      for await (const chunk of node.stream("/mesh/messages/stream")) {
        let m; try { m = JSON.parse(chunk); } catch (_) { continue; }
        const mt = /ce-game\/spacegame\/([^/]+)\/state/.exec(m.topic || "");
        if (!mt) continue;
        const payload = decodeHexJson(m.payload_hex); if (!payload || !payload.ships) continue;
        model.snaps.set(mt[1], { snap: payload, at: performance.now() });
        model.lastMsg = performance.now();
        for (const k of payload.kills || []) {
          const key = `${k.killer}|${k.victim}|${payload.tick}`;
          if (!seenKills.has(key)) { seenKills.add(key); pushKill(k); }
        }
      }
    } catch (_) {}
    await sleep(700);
  } })();
  return true;
}
function decodeHexJson(hex) { if (!hex) return null; try {
  const b = new Uint8Array(hex.length / 2);
  for (let i = 0; i < b.length; i++) b[i] = parseInt(hex.substr(i * 2, 2), 16);
  return JSON.parse(new TextDecoder().decode(b)); } catch (_) { return null; } }
const sleep = ms => new Promise(r => setTimeout(r, ms));

//==================================================================================================
// Render — belts from the real worldgen, live ships, sector grid, pan/zoom camera in WORLD units.
//==================================================================================================
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
let W = 0, H = 0, DPR = 1;
function resize() { DPR = Math.min(devicePixelRatio || 1, 2); W = cv.width = innerWidth * DPR; H = cv.height = innerHeight * DPR; }
addEventListener("resize", resize); resize();

// Camera: world-units → screen. Starts framing the plus-ring.
const cam = { x: SECTOR_SIZE / 2, y: SECTOR_SIZE / 2, ppw: 0, tppw: 0 };
cam.ppw = cam.tppw = Math.min(W, H) / (SECTOR_SIZE * 2.4);
const toScreen = (wx, wy) => [(wx - cam.x) * cam.ppw + W / 2, (wy - cam.y) * cam.ppw + H / 2];

const stars = [...Array(320)].map((_, i) => ({ x: hash01(i, 7, 3), y: hash01(i, 13, 5), z: hash01(i, 29, 9) * 0.7 + 0.3 }));

// Belt haze: sample the real density field on a coarse screen grid (cheap, pretty, truthful).
function drawBelts() {
  const step = 14 * DPR;                       // px between samples
  for (let sy = 0; sy < H + step; sy += step) {
    for (let sx = 0; sx < W + step; sx += step) {
      const wx = (sx - W / 2) / cam.ppw + cam.x, wy = (sy - H / 2) / cam.ppw + cam.y;
      const d = beltAt(wx, wy);
      if (d <= 0.02) continue;
      const rich = beltAt(wx + 431, wy - 977) * 0.5;         // subtle tint variation
      ctx.fillStyle = `rgba(${90 + rich * 60 | 0},${105 + d * 50 | 0},${140 + d * 60 | 0},${0.05 + d * 0.16})`;
      ctx.fillRect(sx - step / 2, sy - step / 2, step, step);
      // When zoomed in enough that rock cells are visible, dot the densest cells like gravel.
      if (cam.ppw * ROCK_CELL > 7 && d > 0.25 && hash01(Math.floor(wx / ROCK_CELL), Math.floor(wy / ROCK_CELL), 11) < d) {
        ctx.fillStyle = `rgba(150,165,200,${0.25 + d * 0.4})`;
        const r = (1 + d * 2.4) * DPR;
        ctx.fillRect(sx - r / 2, sy - r / 2, r, r);
      }
    }
  }
}

function shipStyle(sv) {
  if (sv.owner === "marauders") return { col: "#ff5f4d", r: 3.2 };
  if (sv.owner) return { col: "#8fe0a8", r: 2.6 };
  return { col: `hsl(${sv.hue | 0} 90% 66%)`, r: 4.2, player: true };
}

function draw() {
  cam.ppw += (cam.tppw - cam.ppw) * 0.14;
  ctx.fillStyle = "#03060e"; ctx.fillRect(0, 0, W, H);
  // Distant stars (gentle parallax to the camera).
  for (const s of stars) {
    const sx = ((s.x - cam.x / (SECTOR_SIZE * 40)) % 1 + 1) % 1 * W;
    const sy = ((s.y - cam.y / (SECTOR_SIZE * 40)) % 1 + 1) % 1 * H;
    ctx.fillStyle = `rgba(150,180,230,${0.10 + s.z * 0.26})`;
    ctx.fillRect(sx, sy, DPR * s.z * 1.4, DPR * s.z * 1.4);
  }
  drawBelts();

  // Sector grid + tokens (addressing, not walls — faint on purpose).
  ctx.strokeStyle = "rgba(120,170,255,0.10)"; ctx.lineWidth = DPR;
  ctx.fillStyle = "rgba(127,147,173,0.5)"; ctx.font = `${10 * DPR}px ui-monospace,monospace`;
  const gx0 = Math.floor((cam.x - W / 2 / cam.ppw) / SECTOR_SIZE), gx1 = Math.ceil((cam.x + W / 2 / cam.ppw) / SECTOR_SIZE);
  const gy0 = Math.floor((cam.y - H / 2 / cam.ppw) / SECTOR_SIZE), gy1 = Math.ceil((cam.y + H / 2 / cam.ppw) / SECTOR_SIZE);
  for (let gx = gx0; gx <= gx1; gx++) for (let gy = gy0; gy <= gy1; gy++) {
    const [sx, sy] = toScreen(gx * SECTOR_SIZE, gy * SECTOR_SIZE);
    const s = SECTOR_SIZE * cam.ppw;
    ctx.strokeRect(sx, sy, s, s);
    if (s > 90) {
      const tok = `${gx < 0 ? "n" + -gx : gx}_${gy < 0 ? "n" + -gy : gy}`;
      ctx.fillText(tok, sx + 6 * DPR, sy + 14 * DPR);
    }
  }

  // Live ships from the folded snapshots (stale sectors fade out).
  const now = performance.now();
  let players = 0, ships = 0, tick = 0, liveSectors = 0;
  for (const [tok, { snap, at }] of model.snaps) {
    const age = now - at;
    if (age > 12000) continue;
    liveSectors++;
    tick = Math.max(tick, snap.tick || 0);
    const [ox, oy] = sectorOrigin(tok);
    const fade = age < 3000 ? 1 : 1 - (age - 3000) / 9000;
    for (const sv of snap.ships || []) {
      if (!sv.alive) continue;
      ships++;
      const st = shipStyle(sv);
      if (st.player) players++;
      const [px, py] = toScreen(ox + sv.x, oy + sv.y);
      if (px < -40 || py < -40 || px > W + 40 || py > H + 40) continue;
      ctx.globalAlpha = fade;
      // heading tick + glowing dot
      const ang = (sv.a || 0) / 100;
      ctx.strokeStyle = st.col; ctx.lineWidth = DPR * 1.4;
      ctx.beginPath(); ctx.moveTo(px, py);
      ctx.lineTo(px + Math.cos(ang) * (st.r + 6) * DPR, py + Math.sin(ang) * (st.r + 6) * DPR); ctx.stroke();
      ctx.shadowColor = st.col; ctx.shadowBlur = 10 * DPR;
      ctx.fillStyle = st.col;
      ctx.beginPath(); ctx.arc(px, py, st.r * DPR, 0, 7); ctx.fill();
      ctx.shadowBlur = 0;
      if (st.player && cam.ppw * SECTOR_SIZE > 260) {
        ctx.fillStyle = "rgba(223,233,247,0.85)"; ctx.font = `${10 * DPR}px ui-monospace,monospace`;
        ctx.fillText(sv.name || sv.id.slice(0, 6), px + 8 * DPR, py - 6 * DPR);
      }
      ctx.globalAlpha = 1;
    }
  }

  set("s-players", players); set("s-ships", ships); set("s-sectors", liveSectors);
  set("s-tick", tick ? tick.toLocaleString() : "—");
  const src = document.getElementById("s-src");
  if (now - model.lastMsg < 6000) { src.textContent = "live mesh"; src.className = "src-live"; }
  else if (model.lastMsg) { src.textContent = "stalled…"; src.className = "src-off"; }
  requestAnimationFrame(draw);
}
function set(id, v) { document.getElementById(id).textContent = v; }
setInterval(() => {
  document.getElementById("events").innerHTML = model.events.slice(0, 12)
    .map(e => `<div class="ev"><span class="t">${((Date.now() - e.t) / 1000 | 0)}s</span> <span class="kill">${e.text}</span></div>`).join("");
}, 1000);

//==================================================================================================
// Interaction + boot.
//==================================================================================================
let drag = null;
cv.addEventListener("wheel", e => { e.preventDefault(); cam.tppw = Math.min(Math.max(cam.tppw * Math.exp(-e.deltaY * 0.0012), 0.0018), 0.6); }, { passive: false });
cv.addEventListener("pointerdown", e => { drag = { x: e.clientX, y: e.clientY }; cv.classList.add("grabbing"); });
addEventListener("pointermove", e => { if (!drag) return;
  cam.x -= (e.clientX - drag.x) * DPR / cam.ppw; cam.y -= (e.clientY - drag.y) * DPR / cam.ppw;
  drag = { x: e.clientX, y: e.clientY }; });
addEventListener("pointerup", () => { drag = null; cv.classList.remove("grabbing"); });
document.getElementById("fit").onclick = () => {
  // Frame the live ships (or the plus-ring when nothing is live yet).
  let minx = 1e12, miny = 1e12, maxx = -1e12, maxy = -1e12, any = false;
  for (const [tok, { snap, at }] of model.snaps) {
    if (performance.now() - at > 12000) continue;
    const [ox, oy] = sectorOrigin(tok);
    for (const sv of snap.ships || []) { if (!sv.alive) continue; any = true;
      minx = Math.min(minx, ox + sv.x); maxx = Math.max(maxx, ox + sv.x);
      miny = Math.min(miny, oy + sv.y); maxy = Math.max(maxy, oy + sv.y); }
  }
  if (!any) { cam.x = SECTOR_SIZE / 2; cam.y = SECTOR_SIZE / 2; cam.tppw = Math.min(W, H) / (SECTOR_SIZE * 2.4); return; }
  cam.x = (minx + maxx) / 2; cam.y = (miny + maxy) / 2;
  const span = Math.max(maxx - minx, maxy - miny, 1200) * 1.5;
  cam.tppw = Math.min(W, H) / span;
};

(async function boot() {
  const ok = await liveSource().catch(() => false);
  if (!ok) { const s = document.getElementById("s-src"); s.textContent = "no mesh bridge"; s.className = "src-off"; }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
