# spacegame — host CE Spacegame sectors over the mesh. Installed + supervised by the one `ce` node via ce-appmgr.
[app]
name    = "spacegame"
version = "0.1.0"
summary = "Authoritative per-sector multiplayer space arena host; runs the sim in-process and serves it over the mesh."
runtime = "native"
publisher = "c0be11e0ce0aaa769da6f9970244947d3d32a0c0d8302fb5f41f73d7950be456"
[native]
bin = "spacegame"
[native.artifacts]
"darwin-amd64" = "PLACEHOLDER_darwin_amd64"
"linux-amd64"  = "PLACEHOLDER_linux_amd64"
[deps]
# local CE node for mesh discovery/placement; in-process authoritative sector simulation.
[sandbox]
tier       = "none"
net        = "loopback"
capability = "inherit"
[daemon]
enabled = true
# A warm genesis SEED: host the origin plus-ring (0_0 + the 4 edge neighbours) as ordinary
# non-authoritative replicas, so a new player always has a peer to bootstrap/merge against and crossing
# a sector edge near genesis lands on a warm host. Players are the real servers; this is one quorum vote.
# Negative sectors use the `n` token form (SectorId::token: -1 -> "n1"); a leading-dash "-1_0" is parsed
# by clap as a flag and crashes the host. The old systemd seed had this latent bug (never came up).
args    = ["host", "--sector", "0_0", "--sector", "1_0", "--sector", "n1_0", "--sector", "0_1", "--sector", "0_n1"]
restart = "on-failure"
